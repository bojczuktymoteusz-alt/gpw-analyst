name: Diagnostyka Sekretow Discord

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Sprawdzenie dlugosci i obecnosci kluczy
        env:
          PL_KEY: ${{ secrets.DISCORD_WEBHOOK_PL }}
          ENG_KEY: ${{ secrets.DISCORD_WEBHOOK_ENG }}
        run: |
          if [ -z "$PL_KEY" ]; then
            echo "BLAD: DISCORD_WEBHOOK_PL jest PUSTY lub nie istnieje na GitHubie!"
          else
            echo "OK: DISCORD_WEBHOOK_PL istnieje. Dlugosc ciagu: ${#PL_KEY} znakow."
          fi

          if [ -z "$ENG_KEY" ]; then
            echo "BLAD: DISCORD_WEBHOOK_ENG jest PUSTY lub nie istnieje na GitHubie!"
          else
            echo "OK: DISCORD_WEBHOOK_ENG istnieje. Dlugosc ciagu: ${#ENG_KEY} znakow."
          fi
